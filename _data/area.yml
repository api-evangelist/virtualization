features:
- name: Hypervisors and Virtual Machine Platforms
  description: Type-1 and type-2 hypervisors (VMware vSphere/ESXi, Microsoft Hyper-V,
    KVM, Xen, Proxmox VE, Nutanix AHV, Citrix Hypervisor) abstract physical hardware
    so multiple isolated guest operating systems can share compute, memory, and storage.
- name: Cloud Virtual Machines
  description: Cloud providers expose VM-as-a-service offerings (Amazon EC2, Azure
    Virtual Machines, Google Compute Engine, DigitalOcean Droplets, Linode, Hetzner,
    Scaleway, OVHcloud) that programmatically provision, scale, and manage VMs across
    regions and instance types.
- name: VM Images and Templates
  description: Image and template tooling (EC2 Image Builder, Vagrant boxes, OVAs,
    AMIs, Proxmox templates) capture reproducible OS and application baselines that
    can be launched as new VMs on demand.
- name: Lightweight and Container-Native Virtualization
  description: Modern microVM and container-native virtualization platforms (Firecracker,
    KubeVirt, Lima) deliver VM isolation with container-like density and startup times
    for serverless, multi-tenant, and developer workloads.
- name: API and Service Virtualization
  description: API virtualization tools (WireMock, Microcks, Hoverfly, MockServer,
    Mockoon, Prism, Beeceptor) simulate the behavior of real HTTP, REST, gRPC, and
    message-based services so teams can develop, test, and demo against realistic
    endpoints without live dependencies.
- name: Contract Testing and Mocking from OpenAPI
  description: Contract-based virtualization (Pact stubs, Specmatic, Prism, Microcks,
    Postman Mock Server) generates mocks directly from OpenAPI, AsyncAPI, GraphQL,
    and Pact contracts to validate consumer/provider behavior throughout the SDLC.
- name: Performance and Traffic Replay
  description: Tools like Speedscale and Hoverfly capture and replay real production
    traffic against virtualized services for load testing, regression testing, and
    resilience engineering.
use_cases:
- name: Infrastructure Consolidation and Server Virtualization
  description: Enterprises consolidate physical servers onto VMware vSphere, Hyper-V,
    or Proxmox clusters to improve hardware utilization, simplify operations, and
    enable live migration of workloads.
- name: Self-Service Cloud VM Provisioning
  description: Platform teams expose Amazon EC2, Azure VMs, or Google Compute Engine
    through internal portals and APIs so developers can spin up VMs on demand without
    raising tickets.
- name: Local Development Environments with Vagrant and Lima
  description: Developers use Vagrant, Lima, and similar tools to reproducibly build
    local VM-based environments that match production OS, runtime, and dependency
    baselines.
- name: Parallel Front-End and Back-End Development
  description: Front-end and back-end teams use WireMock, Mockoon, or Postman Mock
    Server to virtualize APIs from OpenAPI contracts so UI work can proceed before
    the real backend is implemented.
- name: Integration Testing Against Third-Party APIs
  description: QA teams virtualize third-party APIs (payments, identity, shipping)
    with Microcks, MockServer, or Hoverfly to run integration tests deterministically
    without hitting rate limits or burning real money.
- name: Demos and Sales Engineering Environments
  description: Sales engineers and partners use API mocks and lightweight VMs to spin
    up disposable demo environments that look and behave like production without exposing
    real customer data.
- name: Disaster Recovery and VM Migration
  description: Operators use VMware, Nutanix, and OpenStack tooling to snapshot, replicate,
    and migrate VMs across sites for DR drills, datacenter exits, and cloud migrations.
integrations:
- name: VMware
  description: Enterprise virtualization platform spanning vSphere, ESXi, NSX, and
    vCenter for managing VMs, networking, and storage across private and hybrid clouds.
- name: Amazon EC2
  description: AWS elastic compute service providing on-demand virtual machines across
    hundreds of instance types, AMIs, and regions through a programmable API.
- name: Azure Virtual Machines
  description: Microsoft Azure's IaaS VM offering with Linux and Windows images, scale
    sets, spot instances, and tight integration with Azure networking and identity.
- name: Google Cloud Compute Engine
  description: Google Cloud's VM service offering custom machine types, live migration,
    sole-tenant nodes, and confidential VMs.
- name: Proxmox VE
  description: Open-source virtualization platform combining KVM hypervisor and LXC
    containers with a unified web UI and REST API for self-hosted clouds.
- name: Nutanix
  description: Hyperconverged infrastructure platform with the AHV hypervisor that
    unifies compute, storage, and networking for private and hybrid clouds.
- name: WireMock
  description: Open-source API mocking and service virtualization tool for HTTP services,
    widely used in CI pipelines and contract testing.
- name: Microcks
  description: CNCF Sandbox API mocking and contract testing platform that turns OpenAPI,
    AsyncAPI, gRPC, and Postman collections into deployable mocks.
- name: Hoverfly
  description: API simulation and service virtualization tool that captures and replays
    HTTP/HTTPS traffic for testing and development.
- name: MockServer
  description: Flexible mock server for HTTP and HTTPS that can match requests, return
    canned responses, and verify expectations across multiple languages.
- name: Mockoon
  description: Desktop and CLI tool for designing and running local API mocks from
    OpenAPI specs without writing code.
- name: Prism
  description: Stoplight's open-source HTTP mock server and contract validator that
    runs OpenAPI 3 specs as live mock APIs.
